<body>
    <div class="cursor-fihh" id="cursorFish"></div>

<div class="clock-wrapper" style="position: absolute; top: 690px; left: 1500px; min-height: 200px;">
    <div class="clock-container" style="width: 150px; height: 150px; position: absolute; top: 20px; left: 50px;">
        <div class="analog-clock" style="width: 130px; height: 130px; border: 4px solid #770909; border-radius: 50%; position: relative; background: #fff9fe; margin: 0 auto;">
            <!-- Clock numbers with inline styles for testing -->
            <div class="number twelve" style="position: absolute; top: 3px; left: 50%; transform: translateX(-50%); font-size: 14px; color: #440000;">12</div>
            <div class="number three" style="position: absolute; right: 3px; top: 50%; transform: translateY(-50%); font-size: 14px; color: #440000;">3</div>
            <div class="number six" style="position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); font-size: 14px; color: #440000;">6</div>
            <div class="number nine" style="position: absolute; left: 3px; top: 50%; transform: translateY(-50%); font-size: 14px; color: #440000;">9</div>
            
            <!-- Clock hands with explicit styles for testing -->
            <div class="hand hour-hand" id="hour-hand" style="position: absolute; bottom: 50%; left: 50%; width: 4px; height: 35px; background: #000000; transform-origin: bottom; transform: rotate(90deg); margin-left: -2px; border-radius: 4px 4px 0 0;"></div>
            <div class="hand minute-hand" id="minute-hand" style="position: absolute; bottom: 50%; left: 50%; width: 3px; height: 45px; background: #000000; transform-origin: bottom; transform: rotate(180deg); margin-left: -1.5px; border-radius: 3px 3px 0 0;"></div>
            <div class="hand second-hand" id="second-hand" style="position: absolute; bottom: 50%; left: 50%; width: 1.5px; height: 50px; background: #500000; transform-origin: bottom; transform: rotate(270deg); margin-left: -0.75px; border-radius: 1.5px 1.5px 0 0;"></div>
            <div class="center-dot" style="position: absolute; width: 10px; height: 10px; background: #000000; border: 2px solid #000000; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10;"></div>
        </div>
    </div>
</div>
