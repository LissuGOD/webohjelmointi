<html lang="fi">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="cursor-fihh" id="cursorFish"></div>
<div class="clock-container" style="width: 250px; height: 250px; margin: 30px auto; position: relative;">
    <div class="analog-clock" style="width: 220px; height: 220px; border: 8px solid #ffb6e7; border-radius: 50%; position: relative; background: #fff9fe; margin: 0 auto;">
        <!-- Clock numbers with inline styles for testing -->
        <div class="number twelve" style="position: absolute; top: 5px; left: 50%; transform: translateX(-50%); font-size: 20px; color: #4a4a9e;">12</div>
        <div class="number three" style="position: absolute; right: 5px; top: 50%; transform: translateY(-50%); font-size: 20px; color: #4a4a9e;">3</div>
        <div class="number six" style="position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); font-size: 20px; color: #4a4a9e;">6</div>
        <div class="number nine" style="position: absolute; left: 5px; top: 50%; transform: translateY(-50%); font-size: 20px; color: #4a4a9e;">9</div>
        
        <!-- Clock hands with explicit styles for testing -->
        <div class="hand hour-hand" id="hour-hand" style="position: absolute; bottom: 50%; left: 50%; width: 6px; height: 60px; background: #4a4a9e; transform-origin: bottom; transform: rotate(90deg); margin-left: -3px; border-radius: 6px 6px 0 0;"></div>
        <div class="hand minute-hand" id="minute-hand" style="position: absolute; bottom: 50%; left: 50%; width: 4px; height: 80px; background: #6b6bb3; transform-origin: bottom; transform: rotate(180deg); margin-left: -2px; border-radius: 4px 4px 0 0;"></div>
        <div class="hand second-hand" id="second-hand" style="position: absolute; bottom: 50%; left: 50%; width: 2px; height: 90px; background: #ff8acd; transform-origin: bottom; transform: rotate(270deg); margin-left: -1px; border-radius: 2px 2px 0 0;"></div>
        <div class="center-dot" style="position: absolute; width: 14px; height: 14px; background: #ffb6e7; border: 2px solid #4a4a9e; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10;"></div>
    </div>
</div>
